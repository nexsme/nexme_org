{% extends 'base.html' %}
{% block content %}

<div class="content container-fluid">

    <!-- Page Header -->
    <div class="page-header">
        <div class="row">
            <div class="col">
                <h3 class="page-title">{{title|title}}</h3>
                <ul class="breadcrumb">
                    <li class="breadcrumb-item"><a href="{% url 'app' %}">Dashboard</a></li>
                    <li class="breadcrumb-item active">{{title|title}}</li>
                </ul>
            </div>
        </div>
    </div>
    <!-- /Page Header -->

    <div class="row">
        <div class="col-md-6">
            <div class="card">

                <div class="card-body">
                    <form action="{{url}}" method="post" class="ajax redirect">
                        {% csrf_token %}
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="{{ form.variation_type.id_for_label }}">
                                        {{ form.variation_type.label }}

                                        {% if form.variation_type.field.required %}
                                        <small class="star text-danger">*</small>
                                        {% endif %}
                                    </label>
                                    {{ form.variation_type }}
                                </div>

                                <div class="form-group" style="display: none;">
                                    <label for="{{ form.other_type.id_for_label }}">
                                        {{ form.other_type.label }}

                                        {% if form.other_type.field.required %}
                                        <small class="star text-danger">*</small>
                                        {% endif %}
                                    </label>
                                    {{ form.other_type }}
                                </div>

                                <div class="form-group">
                                    <label for="{{ form.name.id_for_label }}">
                                        {{ form.name.label }}

                                        {% if form.name.field.required %}
                                        <small class="star text-danger">*</small>
                                        {% endif %}
                                    </label>
                                    {{ form.name }}
                                </div>
                            </div>
                        </div>
                        <div class="text-right">
                            <button type="submit" class="btn btn-soft-primary btn-sm">Submit</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

</div>

{% endblock %}
{% block static %}
{{ form.media }}
<script>
    $(document).ready(function(){
        $('#id_variation_type').change();
    })
    $('#id_variation_type').change(function(){
        if($(this).val() == 30)
            $("#id_other_type").parent().show();
        else{
            $("#id_other_type").val('');
            $("#id_other_type").parent().hide();
        }
    })
</script>
{% endblock %}
