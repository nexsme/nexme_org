{% block static %}
{% load static %}
<link href="{% static 'vendors/bower_components/fullcalendar/dist/fullcalendar.min.css' %}" rel="stylesheet">
<script>
    document.addEventListener('DOMContentLoaded', function () {
        var calendarEl = document.getElementById('calendar');
        var calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            dateClick: function (info) {
                // change the day's background color just for fun
                // info.dayEl.style.backgroundColor = 'red';

                let date = new Date(info.date);
                var str = date.toLocaleDateString('en-US', { year: 'numeric', month: '2-digit', day: '2-digit' });
                var redirect_url = "{% url 'staffs:staff_attendance' %}?date=" + str;
                window.location.href = redirect_url;

            },
            selectable: true,
        });
        calendar.render();
    });
</script>
